name: thrashing_test

# Tests what happens when the bot gets interrupted repeatedly in quick
# succession, before it ever finishes a sentence. Checks whether the
# pipeline still recovers and answers a clean final question correctly, or
# whether the conversation context/state gets corrupted. Synthesized via
# Kokoro, no human needed.
#
# NOTE: earlier versions of this test asserted a distinct
# `user_started_speaking` event for each successive interruption and
# treated it as a bug when the 2nd/3rd didn't fire. Investigated directly
# (bot.py's own debug log, same finding independently confirmed on the
# fix-edge-cases/audio branch): VAD only logs "User started speaking" once
# for one continuous run of speech with no silence gap in between - the
# 2nd/3rd "interruptions" here have essentially no gap from the first, so
# there's nothing to "restart". That's correct VAD behavior, not a bug -
# rewritten to check what actually matters: does everything still get
# transcribed, and does the pipeline recover to answer normally afterward.
#
# Run (two terminals):
#   python bot.py -t eval
#   pipecat eval run evals/thrashing_test.yaml -v

user:
  modality: audio
  speech:
    service: kokoro
    voice: af_heart
    sample_rate: 16000

turns:
  - user: "Can you explain how airplanes fly, in detail?"
    expect:
      - event: llm_started
        within_ms: 8000

  # First interruption, 500ms into the response - this is the one true
  # VAD start event; "Actually hold on" and "One more second" below
  # follow with essentially no silence gap, so they're part of the same
  # continuous speech run rather than separate restarts.
  - user: "Wait, actually hold on, one more second."
    send_after:
      event: llm_started
      delay_ms: 500
    expect:
      - event: user_started_speaking
        within_ms: 4000
      - event: user_transcription
        within_ms: 8000

  # After the rapid interruption, ask something clean and check the bot
  # still answers coherently - proves the pipeline recovered rather than
  # being left in a broken/confused state.
  - user: "What is your name?"
    send_after:
      event: user_transcription
      delay_ms: 1500
    expect:
      - event: user_transcription
        within_ms: 6000
      - event: llm_response
        within_ms: 10000
