name: stt_failure_test

# Tests the fallback-apology path when speech-to-text itself is broken (bad
# GROQ_API_KEY). Requires starting the bot process with a bad key and
# SKIP_STARTUP_SELF_CHECK=1 (the startup self-check would otherwise catch
# the same bad key and exit before this scenario ever gets a chance to run).
#
# Unlike the audio variant, there's no TTS here - the fallback apology is
# delivered as a plain RTVI "bot-llm-text" message, which the eval harness
# surfaces as an llm_response event even though it didn't actually come from
# the LLM (see bot.py's on_pipeline_error). No audio judge needed - checking
# the literal text is enough since there's no synthesis step to verify.
#
# Run (two terminals):
#   set GROQ_API_KEY=bad_key_for_testing
#   set SKIP_STARTUP_SELF_CHECK=1
#   python bot.py -t eval
#
#   (separate terminal, real key not needed for the eval client itself)
#   pipecat eval run evals/stt_failure_test.yaml -v

user:
  modality: audio
  speech:
    service: kokoro
    voice: af_heart
    sample_rate: 16000

turns:
  - user: "Hello, are you there?"
    expect:
      - event: llm_response
        text_contains: "glitch"
        within_ms: 15000
